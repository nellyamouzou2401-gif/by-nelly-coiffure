<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Calendrier</title><style>body{margin:0;font-family:-apple-system,Arial;background:#FAF6F5;color:#654f4f}header{text-align:center;padding:24px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06)}.logo{width:120px}.container{padding:18px;padding-bottom:90px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:#fff;border-radius:24px;padding:22px;box-shadow:0 6px 18px rgba(0,0,0,.06);text-align:center;text-decoration:none;color:inherit}input,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #eee;box-sizing:border-box;margin:6px 0}button{background:#f5d6dc;border:none;padding:12px 18px;border-radius:14px}nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:14px;display:flex;justify-content:space-around;box-shadow:0 -2px 10px rgba(0,0,0,.08)}ul{padding-left:20px}</style></head><body><header><img class="logo" src="assets/logo.png"><div>Calendrier</div></header><div class='container'><input id='r' placeholder='Ex : Mardi 14h - Sarah - Tresses'><button onclick='add()'>Ajouter</button><ul id='list'></ul><script>let d=JSON.parse(localStorage.getItem('rdv')||'[]');function draw(){document.getElementById('list').innerHTML=d.map(x=>'<li>'+x+'</li>').join('')}function add(){let r=document.getElementById('r');if(r.value){d.push(r.value);localStorage.setItem('rdv',JSON.stringify(d));r.value='';draw();}}draw();</script></div><nav><a href='index.html'>🏠</a> <a href='calendrier.html'>📅</a> <a href='galerie.html'>💇</a> <a href='clientes.html'>👩</a> <a href='stock.html'>📦</a> <a href='notes.html'>📝</a></nav></body></html>
