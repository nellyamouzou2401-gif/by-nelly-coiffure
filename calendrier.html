<!doctype html><html><head><meta charset='utf-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>By Nelly</title><style>
body{font-family:-apple-system,Arial,sans-serif;background:#FAF7F6;margin:0;color:#5f4a4a}
header{background:#fff;padding:24px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.logo{font-size:30px;color:#C99A9A;font-weight:700}
.container{padding:18px;max-width:600px;margin:auto}
.card{background:#fff;border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 4px 14px rgba(0,0,0,.06)}
input,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid #eee;box-sizing:border-box}
button,.btn{background:#F3D7D7;border:none;padding:12px 16px;border-radius:16px;color:#5f4a4a;cursor:pointer;text-decoration:none;display:inline-block}
nav{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px;display:flex;justify-content:space-around;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
main{padding-bottom:90px}
</style></head>
<body>
<header><div class='logo'>🎀 By Nelly Coiffure</div><div>📅 Calendrier</div></header>
<main class='container'>
    <div class='card'>
    <input id='rdv' placeholder='Ex : Mardi 14h - Sarah - Tresses'>
    <br><br><button onclick='add()'>Ajouter un rendez-vous</button>
    <ul id='list'></ul>
    </div>
    <script>
    let data=JSON.parse(localStorage.getItem('rdv')||'[]');
    function draw(){list.innerHTML=data.map(x=>`<li>${x}</li>`).join('')}
    function add(){if(rdv.value){data.push(rdv.value);localStorage.setItem('rdv',JSON.stringify(data));rdv.value='';draw();}}
    draw();
    </script>
    </main>

<nav>

<a href='galerie.html'>💇</a>

</nav>

</body></html>
